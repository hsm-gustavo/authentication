version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/queries/"
    schema: "internal/database/migrations/"
    gen:
      go:
        emit_interface: true
        emit_json_tags: true
        json_tags_id_uppercase: true
        emit_db_tags: true
        emit_empty_slices: true
        package: "database"
        out: "ỉnternal/database"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "timestamptz"
            go_type:
              type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "*time.Time"
